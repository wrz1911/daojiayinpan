name: Build Windows

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev mingw-w64

      - name: Setup frontend
        run: |
          mkdir -p web/css/fonts web/css/yinpan web/js web/qimen_app/js
          cp css/tool.css web/css/
          cp css/yinpan/yinpan.css web/css/yinpan/
          cp css/fonts/MiSans-VF.ttf web/css/fonts/
          cp js/tyme4ts-browser.js web/js/
          cp js/gong_detail_data.js web/js/
          cp qimen_app/yinpan_standalone.html web/qimen_app/
          cp qimen_app/js/qimen_engine_min.js web/qimen_app/js/

      - name: Build
        run: cargo build --manifest-path src-tauri/Cargo.toml --target x86_64-pc-windows-gnu --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-exe
          path: src-tauri/target/x86_64-pc-windows-gnu/release/app.exe

  sign:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-exe

      - name: Submit to SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: daojiayinpan
          signing-policy-slug: release-signing
          artifact-configuration-slug: windows-exe
          github-artifact-id: app-exe
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Upload signed
        uses: actions/upload-artifact@v4
        with:
          name: app-exe-signed
          path: signed/
